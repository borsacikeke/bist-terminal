name: BIST Gunluk Tarama

on:
  schedule:
    - cron: '20 6 * * 1-5'   # 09:20 TR - 4h mumu
    - cron: '20 10 * * 1-5'  # 13:20 TR - 4h mumu
    - cron: '20 14 * * 1-5'  # 17:20 TR - 4h mumu
    - cron: '0 16 * * 1-5'   # 19:00 TR - günlük kapanış
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tarama:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri yükle
        run: pip install yfinance requests pandas numpy pytz

      - name: Taramayı çalıştır
        run: python tarama.py

      - name: Sonuçları kaydet
        run: |
          git config user.name "BIST Bot"
          git config user.email "bot@bist.com"
          git pull --rebase origin main
          git add -f sonuclar.json sonuclar4h.json
          git commit --allow-empty -m "Otomatik guncelleme - $(date +'%d.%m.%Y %H:%M')"
          git push origin main
