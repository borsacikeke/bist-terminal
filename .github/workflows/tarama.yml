name: BIST Gunluk Tarama

on:
  schedule:
    - cron: '25 15 * * 1-5'
  workflow_dispatch:

jobs:
  tarama:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri yükle
        run: pip install yfinance ta matplotlib requests pandas numpy

      - name: Taramayı çalıştır
        run: python tarama.py

      - name: Sonuçları kaydet
        run: |
          git config user.name "BIST Bot"
          git config user.email "bot@bist.com"
          git add sonuclar.json
          git diff --staged --quiet || git commit -m "Otomatik guncelleme - $(date +'%d.%m.%Y %H:%M')"
          git push
